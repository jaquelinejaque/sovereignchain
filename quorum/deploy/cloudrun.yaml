# ============================================================================
# Cloud Run service spec — Quorum API
# Apply with:
#   gcloud run services replace deploy/cloudrun.yaml \
#       --region=europe-west2 --project=sovereignclean-469613
#
# Notes on secrets:
#   Every API key below is read from Google Secret Manager at runtime via
#   valueFrom.secretKeyRef. Create each secret once:
#     gcloud secrets create ANTHROPIC_API_KEY --replication-policy=automatic
#     printf '%s' "$VALUE" | gcloud secrets versions add ANTHROPIC_API_KEY --data-file=-
#   Then grant the runtime service account access:
#     gcloud secrets add-iam-policy-binding ANTHROPIC_API_KEY \
#       --member=serviceAccount:quorum-api@sovereignclean-469613.iam.gserviceaccount.com \
#       --role=roles/secretmanager.secretAccessor
# ============================================================================
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: quorum-api
  namespace: sovereignclean-469613
  labels:
    cloud.googleapis.com/location: europe-west2
    app: quorum
    component: api
    managed-by: cloud-run
  annotations:
    run.googleapis.com/launch-stage: GA
    run.googleapis.com/ingress: all
    run.googleapis.com/description: "Quorum FastAPI — multi-LLM consensus API for Sovereign Chain"
spec:
  template:
    metadata:
      labels:
        app: quorum
        component: api
      annotations:
        # ---- Autoscaling ----
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
        # ---- Execution environment ----
        run.googleapis.com/execution-environment: gen2
        run.googleapis.com/cpu-throttling: "true"
        run.googleapis.com/startup-cpu-boost: "true"
        # ---- Optional: pin to a VPC connector if you add private deps ----
        # run.googleapis.com/vpc-access-connector: projects/sovereignclean-469613/locations/europe-west2/connectors/quorum-vpc
        # run.googleapis.com/vpc-access-egress: private-ranges-only
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      serviceAccountName: quorum-api@sovereignclean-469613.iam.gserviceaccount.com
      containers:
        - name: quorum-api
          # Replace TAG at deploy time (or use :latest if you trust the registry digest).
          image: europe-west2-docker.pkg.dev/sovereignclean-469613/quorum/quorum-api:latest
          ports:
            - name: http1
              containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: "1Gi"
          # ---- Non-secret env ----
          env:
            - name: PORT
              value: "8080"
            - name: ENV
              value: "production"
            - name: LOG_LEVEL
              value: "info"
            - name: GCP_PROJECT
              value: "sovereignclean-469613"
            - name: GCP_REGION
              value: "europe-west2"

            # ---- LLM provider keys (Secret Manager) ----
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ANTHROPIC_API_KEY
                  key: latest
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: OPENAI_API_KEY
                  key: latest
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: GEMINI_API_KEY
                  key: latest
            - name: REPLICATE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: REPLICATE_API_TOKEN
                  key: latest

            # ---- Stripe (billing + webhook signature) ----
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: STRIPE_SECRET_KEY
                  key: latest
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: STRIPE_WEBHOOK_SECRET
                  key: latest

            # ---- HSP gate / protocol ----
            - name: HSP_GATE_WEBHOOK
              valueFrom:
                secretKeyRef:
                  name: HSP_GATE_WEBHOOK
                  key: latest
            - name: HSP_PROTOCOL_KEY
              valueFrom:
                secretKeyRef:
                  name: HSP_PROTOCOL_KEY
                  key: latest

          # ---- Probes ----
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 0
            timeoutSeconds: 3
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            timeoutSeconds: 3
            periodSeconds: 30
            failureThreshold: 3

  traffic:
    - percent: 100
      latestRevision: true
